secrets:
  - GITHUB_TOKEN

steps:
  - group: "Quality"
    key: "quality"
    steps:
      - label: "Format"
        command: "mise run :format -- --check"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

      - label: "Lint Backend"
        command: "cd backend && mise x -- uv sync --all-groups && cd .. && mise run //backend:lint"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

      - label: "Lint Client"
        command: "mise run //client:lint"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

      - label: "Typecheck Backend"
        command: "cd backend && mise x -- uv sync --all-groups && cd .. && mise run //backend:typecheck"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

      - label: "Lint Markdown"
        command: "mise run :lint"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

  - group: "Test"
    key: "test"
    depends_on: "quality"
    steps:
      - label: "Test Backend"
        command: "cd backend && mise x -- uv sync --all-groups && cd .. && mise run //backend:test -- --ci"
        artifact_paths:
          - "backend/results/*.xml"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

      - label: "Test Client"
        command: "mise run //client:test"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

  - group: "Build"
    depends_on: "test"
    steps:
      # Runs on the agent host (not inside the compose app container); avoids Docker-in-Docker.
      - label: "Build Backend Docker"
        command: "docker build -t jetlag-backend backend/"

      - label: "Build Android"
        command: "mise run //client:build android"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true

      - label: "Build Desktop"
        command: "mise run //client:build desktop"
        plugins:
          - docker-compose#v5.8.0:
              run: app
              config: .buildkite/docker-compose.ci.yml
              mount-checkout: true
              propagate-environment: true
