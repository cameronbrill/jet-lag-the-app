services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: jetlag
      POSTGRES_USER: jetlag
      POSTGRES_PASSWORD: jetlag-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jetlag"]
      interval: 2s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  valkeydata:
