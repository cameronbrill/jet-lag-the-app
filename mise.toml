experimental_monorepo_root = true

[settings]
experimental = true
auto_install = false
lockfile = true

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[monorepo]
config_roots = ["backend", "client"]

[env]
MISE_EXPERIMENTAL = "1"
MISE_LOG_LEVEL = "info"
MISE_PIN = "1"
PROJECT_NAME = "jet-lag"
ENV = "development"
# Align with ENV above so fnox loads the matching profile from fnox.toml.
_.fnox-env = { tools = true, profile = "development" }

[tools]
# hk: `brew install hk` (no mise backend for macOS x86_64)
# bk: `mise use github:buildkite/cli` (opt-in, hits GitHub rate limits without GITHUB_TOKEN)
node = "22"
java = "21.0.2"
fnox = "latest"
dprint = "0.50.2"
"npm:markdownlint-cli" = "latest"
"aqua:pinterest/ktlint" = "1.8.0"
"aqua:ariga/atlas" = "latest"
"aqua:sqlc-dev/sqlc" = "latest"

[task_templates."python:lint"]
description = "Lint Python with ruff"
run = "uv run ruff check ."
tools = { python = "3.14.4", uv = "latest" }

[task_templates."python:typecheck"]
description = "Type check Python with ty"
run = "uv run ty check"
tools = { python = "3.14.4", uv = "latest" }

[task_templates."python:test"]
description = "Run Python tests"
run = "uv run pytest"
tools = { python = "3.14.4", uv = "latest" }
