build:
  maxIssues: 0

config:
  validation: true

complexity:
  LongMethod:
    threshold: 80
  TooManyFunctions:
    threshold: 20

style:
  MagicNumber:
    ignoreNumbers: ["-1", "0", "1", "2"]

empty-blocks:
  EmptyFunctionBlock:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: false
